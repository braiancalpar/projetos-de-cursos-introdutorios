<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo</title>
  </head>
  <body>
    <form action="/submit-form" method="POST">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" />

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" />

      <label for="cpf">CPF:</label>
      <input type="text" id="cpf" name="cpf" type="text" required minlength="11" maxlength="14" pattern="\d{3}\.?\d{3}\.?\d{3}-?\d{2}" title="Digite um CPF no formato: 000.000.000-00 ou 00000000000"/>

      <label for="senha">Senha:</label>
      <input type="password" id="senha" name="senha" />

      <label for="aniversario">Data de nascimento:</label>
      <input type="date" id="aniversario" name="aniversario" />

      <label for="termos">Aceito os termos e condições</label>
      <input type="checkbox" id="termos" name="termos" />

      <input type="submit" value="Registrar" />
    </form>
  </body>
</html>
